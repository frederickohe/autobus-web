services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-https://api.useautobus.com}
        PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
        PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-https://useautobus.com}
    container_name: autobus_web
    restart: unless-stopped
    ports:
      - "8080:80"   # optional; Caddy uses autobus_web:80 on the shared network
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy
